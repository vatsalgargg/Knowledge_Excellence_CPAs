name = 'kecpa'
compatibility_date = "2026-04-22"
main = "worker.js"

# Static assets are served via the ASSETS binding.
# The worker script intercepts requests first and falls through to ASSETS
# for all normal browser traffic. AI agents sending Accept: text/markdown
# on "/" receive llms.txt with Content-Type: text/markdown instead.
[assets]
directory = "./"
binding = "ASSETS"
